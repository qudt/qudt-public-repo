<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>QUDT QuantityKind Subtree Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/n3@1.17.4/browser/n3.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 1.5rem; color: #222; background: #fff; color-scheme: light; }
  h1 { font-size: 1.3rem; }
  fieldset { border: 1px solid #ccc; border-radius: 6px; margin-bottom: 1rem; padding: 0.8rem 1rem; }
  legend { font-weight: 600; padding: 0 0.4rem; }
  label { margin-right: 1.2rem; }
  input[type=text] { padding: 0.35rem 0.5rem; border: 1px solid #bbb; border-radius: 4px; }
  #qkInput { width: 28rem; }
  #endpointUrl { width: 28rem; }
  select { padding: 0.3rem; }
  button { padding: 0.45rem 1rem; border: 1px solid #888; border-radius: 5px; background: #f5f5f5; cursor: pointer; }
  button:hover { background: #e8e8e8; }
  button.primary { background: #004085; color: #fff; border-color: #004085; }
  button.primary:hover { background: #0a58ca; }
  #status { margin: 0.6rem 0; font-size: 0.9rem; color: #555; min-height: 1.2em; }
  #status.error { color: #b00020; }
  #diagram { border: 1px solid #ddd; border-radius: 6px; padding: 1rem; overflow: auto; min-height: 8rem; }
  #diagram svg { max-width: none !important; }
  .row { margin-bottom: 0.6rem; }
  .hidden { display: none; }
  footer { margin-top: 1rem; font-size: 0.8rem; color: #888; }
</style>
</head>
<body>
<h1>QUDT QuantityKind Subtree Viewer</h1>

<fieldset>
  <legend>Data source</legend>
  <div class="row">
    <label><input type="radio" name="source" value="sparql" checked> Published (SPARQL endpoint)</label>
    <label><input type="radio" name="source" value="local"> Local TTL file (e.g. <code>target/dist/vocab/quantitykinds/VOCAB_QUDT-QUANTITY-KINDS-ALL.ttl</code>)</label>
  </div>
  <div class="row" id="sparqlRow">
    <label>Endpoint: <input type="text" id="endpointUrl" value="https://www.qudt.org/fuseki/qudt/sparql"></label>
  </div>
  <div class="row hidden" id="localRow">
    <input type="file" id="ttlFile" accept=".ttl">
    <span id="localInfo"></span>
  </div>
</fieldset>

<fieldset>
  <legend>Query</legend>
  <div class="row">
    <label>Quantity kind: <input type="text" id="qkInput" placeholder="Power | quantitykind:Power | http://qudt.org/vocab/quantitykind/Power"></label>
    <button class="primary" id="renderBtn">Render</button>
  </div>
  <div class="row">
    <label>Direction:
      <select id="direction">
        <option value="BT" selected>BT (root on top)</option>
        <option value="TB">TB</option>
        <option value="LR">LR</option>
        <option value="RL">RL</option>
      </select>
    </label>
    <label>Units:
      <select id="unitMode">
        <option value="nonprefixed" selected>Non-prefixed only</option>
        <option value="all">All</option>
        <option value="count">Counts only</option>
        <option value="none">None</option>
      </select>
    </label>
    <label><input type="checkbox" id="includeParents" checked> Include direct parent(s)</label>
  </div>
</fieldset>

<div id="status"></div>
<div class="row">
  <button id="copyBtn" disabled>Copy Mermaid source</button>
  <button id="svgBtn" disabled>Download SVG</button>
</div>
<div id="diagram"></div>
<footer>Deprecated quantity kinds are always excluded. Edges are <code>skos:broader</code> (child &rarr; parent).
Published mode reflects the post-inference released graph; local mode expects a post-build (dist) file for the same picture.</footer>

<script>
"use strict";
const QK_NS = "http://qudt.org/vocab/quantitykind/";
const QUDT = "http://qudt.org/schema/qudt/";
const SKOS = "http://www.w3.org/2004/02/skos/core#";

const SI_PREFIXES = ["Yotta","Zetta","Exa","Peta","Tera","Giga","Mega","Kilo","Hecto","Deka","Deca",
                     "Deci","Centi","Milli","Micro","Nano","Pico","Femto","Atto","Zepto","Yocto"];

mermaid.initialize({ startOnLoad: false, maxTextSize: 500000 });

const $ = id => document.getElementById(id);
let localModel = null;      // parsed graph from the local TTL
let lastMermaid = null, lastSvg = null;

function setStatus(msg, isError = false) {
  $("status").textContent = msg;
  $("status").className = isError ? "error" : "";
}

function localName(uri) { return uri.substring(uri.lastIndexOf("/") + 1); }

function normalizeQk(input) {
  input = input.trim();
  if (!input) return null;
  if (input.startsWith("http://") || input.startsWith("https://")) return input;
  if (input.startsWith("quantitykind:")) return QK_NS + input.substring("quantitykind:".length);
  return QK_NS + input;
}

function isPrefixedUnit(name) {
  return name.split("-").some(part =>
    SI_PREFIXES.some(p => part.startsWith(p) && part.length > p.length && /[A-Z0-9]/.test(part[p.length])));
}

/* ---------- model: { parents: Map(uri->Set), children: Map(uri->Set), units: Map(uri->[localname]), deprecated: Set } ---------- */

function emptyModel() {
  return { parents: new Map(), children: new Map(), units: new Map(), deprecated: new Set() };
}

function addEdge(model, child, parent) {
  if (!model.parents.has(child)) model.parents.set(child, new Set());
  model.parents.get(child).add(parent);
  if (!model.children.has(parent)) model.children.set(parent, new Set());
  model.children.get(parent).add(child);
}

function addUnit(model, qk, unitLocal) {
  if (!model.units.has(qk)) model.units.set(qk, new Set());
  model.units.get(qk).add(unitLocal);
}

/* ---------- local TTL mode ---------- */

function parseLocalTtl(text) {
  return new Promise((resolve, reject) => {
    const model = emptyModel();
    const known = new Set();
    new N3.Parser().parse(text, (err, quad) => {
      if (err) return reject(err);
      if (!quad) return resolve({ model, count: known.size });
      const s = quad.subject.value, p = quad.predicate.value, o = quad.object.value;
      if (!s.startsWith(QK_NS)) return;
      known.add(s);
      if (p === SKOS + "broader" && o.startsWith(QK_NS)) addEdge(model, s, o);
      else if (p === QUDT + "applicableUnit") addUnit(model, s, localName(o));
      else if (p === QUDT + "deprecated" && o === "true") model.deprecated.add(s);
    });
  });
}

$("ttlFile").addEventListener("change", async ev => {
  const file = ev.target.files[0];
  if (!file) return;
  setStatus("Parsing " + file.name + " ...");
  try {
    const { model, count } = await parseLocalTtl(await file.text());
    localModel = model;
    $("localInfo").textContent = file.name + " — " + count + " quantity kinds";
    setStatus("Loaded " + file.name);
  } catch (e) {
    localModel = null;
    setStatus("TTL parse error: " + e.message, true);
  }
});

/* ---------- SPARQL mode: build a mini-model around the seed ---------- */

async function sparqlSelect(endpoint, query) {
  const resp = await fetch(endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/sparql-query", "Accept": "application/sparql-results+json" },
    body: query
  });
  if (!resp.ok) throw new Error("SPARQL endpoint returned HTTP " + resp.status);
  return (await resp.json()).results.bindings;
}

async function fetchSparqlModel(endpoint, seed) {
  const model = emptyModel();
  const edgeQuery = `
PREFIX skos: <${SKOS}>
PREFIX qudt: <${QUDT}>
SELECT DISTINCT ?c ?p WHERE {
  ?c skos:broader* <${seed}> .
  { ?c skos:broader ?p . ?p skos:broader* <${seed}> }
  UNION
  { FILTER(?c = <${seed}>) ?c skos:broader ?p }
  FILTER NOT EXISTS { ?c qudt:deprecated true }
  FILTER NOT EXISTS { ?p qudt:deprecated true }
}`;
  for (const b of await sparqlSelect(endpoint, edgeQuery)) addEdge(model, b.c.value, b.p.value);

  const nodes = new Set([seed]);
  for (const [c, ps] of model.parents) { nodes.add(c); ps.forEach(p => nodes.add(p)); }
  const values = [...nodes].map(u => "<" + u + ">").join(" ");
  const unitQuery = `
PREFIX qudt: <${QUDT}>
SELECT ?qk ?u WHERE { VALUES ?qk { ${values} } ?qk qudt:applicableUnit ?u . }`;
  for (const b of await sparqlSelect(endpoint, unitQuery)) addUnit(model, b.qk.value, localName(b.u.value));

  const existsQuery = `ASK { <${seed}> ?p ?o }`;
  const resp = await fetch(endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/sparql-query", "Accept": "application/sparql-results+json" },
    body: existsQuery
  });
  const exists = (await resp.json()).boolean;
  if (!exists) throw new Error("No triples found for " + seed);
  return model;
}

/* ---------- subtree + mermaid ---------- */

function computeView(model, seed, includeParents) {
  if (model.deprecated.has(seed)) throw new Error(localName(seed) + " is deprecated");
  const subtree = new Set([seed]);
  const stack = [seed];
  while (stack.length) {
    const n = stack.pop();
    for (const c of model.children.get(n) || []) {
      if (!model.deprecated.has(c) && !subtree.has(c)) { subtree.add(c); stack.push(c); }
    }
  }
  const nodes = new Set(subtree);
  const parentNodes = new Set();
  if (includeParents) {
    for (const p of model.parents.get(seed) || []) {
      if (!model.deprecated.has(p)) { nodes.add(p); parentNodes.add(p); }
    }
  }
  const edges = [];
  for (const c of subtree) {
    for (const p of model.parents.get(c) || []) {
      if (nodes.has(p)) edges.push([c, p]);
    }
  }
  edges.sort((a, b) => (a[0] + a[1]).localeCompare(b[0] + b[1]));
  return { nodes, edges, subtree, parentNodes };
}

function mermaidId(uri) { return localName(uri).replace(/[^A-Za-z0-9_]/g, "_"); }

function nodeLabel(model, uri, unitMode) {
  const name = localName(uri);
  const all = [...(model.units.get(uri) || [])].sort();
  let units;
  switch (unitMode) {
    case "all":         units = all; break;
    case "nonprefixed": units = all.filter(u => !isPrefixedUnit(u)); break;
    case "count":       return `${name}<br/>(${all.length} units)`;
    default:            return name;
  }
  if (!units.length) return `<b>${name}</b><br/>(none)`;
  return `<b>${name}</b><br/>` + units.join("<br/>");
}

function buildMermaid(model, view, seed, direction, unitMode) {
  const lines = ["flowchart " + direction];
  const emitted = new Set();
  const emit = uri => {
    if (emitted.has(uri)) return mermaidId(uri);
    emitted.add(uri);
    return `${mermaidId(uri)}["${nodeLabel(model, uri, unitMode)}"]`;
  };
  for (const [c, p] of view.edges) lines.push(`  ${emit(c)} --> ${emit(p)}`);
  for (const n of [...view.nodes].sort()) if (!emitted.has(n)) lines.push("  " + emit(n));
  lines.push("  classDef seed fill:#ffe5cc,stroke:#a04000,stroke-width:2px,color:#000;");
  lines.push("  classDef gp fill:#e8e8e8,stroke:#666,color:#000;");
  lines.push("  class " + mermaidId(seed) + " seed;");
  if (view.parentNodes.size)
    lines.push("  class " + [...view.parentNodes].map(mermaidId).join(",") + " gp;");
  return lines.join("\n");
}

/* ---------- UI wiring ---------- */

document.querySelectorAll("input[name=source]").forEach(r => r.addEventListener("change", () => {
  const local = document.querySelector("input[name=source]:checked").value === "local";
  $("sparqlRow").classList.toggle("hidden", local);
  $("localRow").classList.toggle("hidden", !local);
}));

$("renderBtn").addEventListener("click", render);
$("qkInput").addEventListener("keydown", ev => { if (ev.key === "Enter") render(); });

async function render() {
  const seed = normalizeQk($("qkInput").value);
  if (!seed) { setStatus("Enter a quantity kind.", true); return; }
  const sourceLocal = document.querySelector("input[name=source]:checked").value === "local";
  $("copyBtn").disabled = $("svgBtn").disabled = true;
  try {
    let model;
    if (sourceLocal) {
      if (!localModel) throw new Error("Choose a TTL file first");
      model = localModel;
      if (!model.parents.has(seed) && !model.children.has(seed) && !model.units.has(seed))
        throw new Error(localName(seed) + " not found in the loaded file");
    } else {
      setStatus("Querying endpoint ...");
      model = await fetchSparqlModel($("endpointUrl").value.trim(), seed);
    }
    const view = computeView(model, seed, $("includeParents").checked);
    lastMermaid = buildMermaid(model, view, seed, $("direction").value, $("unitMode").value);
    const { svg } = await mermaid.render("qkGraph", lastMermaid);
    lastSvg = svg;
    $("diagram").innerHTML = svg;
    $("copyBtn").disabled = $("svgBtn").disabled = false;
    setStatus(`${localName(seed)}: ${view.subtree.size} quantity kind(s) in subtree` +
              (view.parentNodes.size ? `, ${view.parentNodes.size} parent(s)` : "") +
              `, ${view.edges.length} edge(s).`);
  } catch (e) {
    $("diagram").innerHTML = "";
    setStatus(e.message, true);
  }
}

$("copyBtn").addEventListener("click", () => {
  navigator.clipboard.writeText(lastMermaid);
  setStatus("Mermaid source copied to clipboard.");
});

$("svgBtn").addEventListener("click", () => {
  const blob = new Blob([lastSvg], { type: "image/svg+xml" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (localName(normalizeQk($("qkInput").value)) || "qk") + "-subtree.svg";
  a.click();
  URL.revokeObjectURL(a.href);
});
</script>
</body>
</html>
