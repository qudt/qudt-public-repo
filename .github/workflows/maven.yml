# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: CI Build

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      base_ref:
        description: 'Branch to compare against. Default is main. For stacked branches, enter the parent branch name.'
        required: false
        default: 'main'
        type: string
      force_snapshot_release:
        description: 'Update the snapshot release on github'
        required: false
        type: boolean

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven


    - name: Check if a snapshot release should be made and set environment variable
      run: echo "MAKE_SNAPSHOT_RELEASE=${{ inputs.force_snapshot_release || (github.event.pull_request.base.ref == 'main' && github.event.action == 'closed' && github.event.pull_request.merged == true) }}" >> $GITHUB_ENV

    # We always compare a branch under test against its base branch before building.
    # The workflow supports three shapes of event:
    # 1. workflow_dispatch: compare the checked-out HEAD against origin/<base_ref>.
    # 2. pull_request from the same repository: compare origin/<base> to origin/<head>.
    # 3. pull_request from a fork: compare origin/<base> to refs/remotes/fork/<head>.
    #
    # The key constraint is that GitHub Actions may check out a real local branch for
    # manual runs. Because of that, we avoid fetches like head:head, which can fail when
    # the destination branch is currently checked out. Instead, we fetch into remote-
    # tracking refs and diff those refs explicitly.
    - name: Determine comparison refs
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "BASE_REF=${{ inputs.base_ref || 'main' }}" >> $GITHUB_ENV
          echo "HEAD_REF=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "DIFF_HEAD=HEAD" >> $GITHUB_ENV
        else
          echo "BASE_REF=${{ github.base_ref }}" >> $GITHUB_ENV
          echo "HEAD_REF=${{ github.head_ref }}" >> $GITHUB_ENV
        fi

      # configure git
    - name: setup git config
      run: |
        git config user.name ${{ github.actor }}
        git config user.email "<>"

    - name: Fetch branches (unless PR was merged)
      if: ${{ env.MAKE_SNAPSHOT_RELEASE == 'false' }}
      run: |
        # Always fetch the base branch into a remote-tracking ref so later steps can
        # diff against a stable name regardless of how checkout represented HEAD.
        git fetch origin "$BASE_REF:refs/remotes/origin/$BASE_REF"
        echo "DIFF_BASE=refs/remotes/origin/$BASE_REF" >> $GITHUB_ENV

        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          # Manual runs already have the target branch checked out. Keep using HEAD
          # instead of fetching into the same local branch name.
          true
        elif [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
          # PR from a contributor fork: fetch the contributor branch into a named
          # remote-tracking ref so we can compare it without touching local branches.
          git remote add fork ${{ github.event.pull_request.head.repo.clone_url }}
          git fetch fork "${{ github.event.pull_request.head.ref }}:refs/remotes/fork/$HEAD_REF"
          echo "DIFF_HEAD=refs/remotes/fork/$HEAD_REF" >> $GITHUB_ENV
        else
          # PR from the same repository: fetch the source branch into origin/<head>
          # and compare the two remote-tracking refs.
          git fetch origin "$HEAD_REF:refs/remotes/origin/$HEAD_REF"
          echo "DIFF_HEAD=refs/remotes/origin/$HEAD_REF" >> $GITHUB_ENV
        fi

    - name: Fail if src/main has changes but CHANGELOG.md does not (unless PR was merged)
      if: ${{ env.MAKE_SNAPSHOT_RELEASE == 'false' }}
      run: |
        set -e
        CHANGED_FILES=$(git diff --name-only "$DIFF_BASE" "$DIFF_HEAD")
        if echo "$CHANGED_FILES" | grep -q '^src/main' && ! echo "$CHANGED_FILES" | grep -q '^CHANGELOG.md$'; then
          echo "Directory src/main changed without an update of CHANGELOG.md, this is not allowed. Please update CHANGELOG.md"
          exit 1
        fi

      # Read version changelog before anything else - if there is a formatting error
      # in the changelog (which happens), we fail fast
      # Do this even if we will not make the snapshot release, so the changelog is checked as part of a normal
      # ci run.

    - name: Check Changelog formatting
      id: get-changelog
      uses: superfaceai/release-changelog-action@v1
      with:
        path-to-changelog: CHANGELOG.md
        version: ${{ inputs.release_version }}
        operation: read

    - name: Build with Maven
      run: mvn -Pzip install

    # delete the snapshot release (the release action does not update the
    # body, so we have to delete the whole thing)
    - name: Delete Snapshot Release
      if: ${{ env.MAKE_SNAPSHOT_RELEASE == 'true' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release delete snapshot --cleanup-tag --yes || echo "Error deleting snapshot release - continuing anyway"

    - name: change tag 'snapshot' to current commit
      if: ${{ env.MAKE_SNAPSHOT_RELEASE == 'true' }}
      run: |
        git tag -f snapshot
        git push -f origin --tags

    - name: Make Release Body
      if: ${{ env.MAKE_SNAPSHOT_RELEASE  == 'true' }}
      run: |
        cat src/build/snapshot-release/release-body-header.md > target/release-body.md
        echo "# Changes" >> target/release-body.md
        cat <<'EOF' >> target/release-body.md 
        ${{ steps.get-changelog.outputs.changelog }}
        EOF
        cat src/build/snapshot-release/release-body-footer.md >> target/release-body.md        

    # Make github release
    - name: Release
      uses: softprops/action-gh-release@v2
      if: ${{ env.MAKE_SNAPSHOT_RELEASE  == 'true' }}
      with:
        name: Latest snapshot release
        tag_name: snapshot
        body_path: target/release-body.md
        files: target/qudt-public-repo-*.zip
        prerelease: true
