name: Close inactive issues
on:
  schedule:
    - cron: "30 01 * * *"

jobs:
  close-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 180
          days-before-issue-close: 180
          stale-issue-label: "stale"
          stale-issue-message: "This issue was marked stale because it has been open for 180 days with no activity."
          close-issue-message: "This issue was closed because it has been inactive for 180 days since being marked as stale. Reopen it if you like."
          days-before-pr-stale: -1
          days-before-pr-close: -1
          repo-token: ${{ secrets.GITHUB_TOKEN }}
